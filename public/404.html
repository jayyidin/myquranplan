<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>myquranplan</title>
    <script>
      // GitHub Pages SPA fallback: redirect to index.html preserving the path
      var pathSegmentsToKeep = 1; // Keep 1 segment for repo name (/myquranplan/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
