                <div className="bg-white p-4 border-b border-gray-200 flex justify-between items-center z-20 shadow-sm shrink-0">
                  <div>
                    <h2 className="text-lg md:text-xl font-black text-gray-800 flex items-center gap-2"><Share2 size={20} className="text-[#00e676]" /> Bagikan Progres</h2>
                    <p className="text-xs text-gray-500 font-medium mt-0.5">Pratinjau gambar laporan mingguan ananda {sharingStudent.name}.</p>
                  </div>
                  <button onClick={() => setSharingStudent(null)} className="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors bg-gray-50"><X size={18} /></button>
                </div>
                
                <div className="overflow-y-auto flex-1 p-4 md:p-6 custom-scrollbar flex justify-center bg-gray-300/30">
                   <div id="student-share-card" className="shrink-0 bg-white border border-gray-200 shadow-sm relative flex flex-col" style={{ width: '540px', minHeight: '960px', height: 'max-content', fontFamily: 'system-ui, sans-serif', boxSizing: 'border-box' }}>
                     
                     <div className="flex items-center gap-3 bg-green-50 p-5 border-b border-green-100 relative z-10 shrink-0">
                       <div className="flex items-center justify-center shrink-0">
                          {institutionLogo && institutionLogo !== 'logo.png' ? (
                             <img src={institutionLogo} alt="Logo" className="h-12 object-contain drop-shadow-sm" />
                          ) : (
                             <div className="w-12 h-12 bg-white rounded-xl border border-green-200 flex items-center justify-center text-green-600 shadow-sm">
                                <BookOpen size={24} strokeWidth={2.5} />
                             </div>
                          )}
                       </div>
                       <div className="flex-1 min-w-0 pr-2">
                         <h1 className="text-[22px] font-black text-gray-900 leading-tight tracking-tight mb-0.5 whitespace-nowrap truncate">Lesson Plan Al-Qur'an</h1>
                         <p className="text-green-600 font-bold text-sm italic whitespace-nowrap truncate">SDIT Al-Fityan School Bogor</p>
                       </div>
                     </div>

                     <div className="flex items-center gap-4 px-5 pt-5 pb-3 relative z-10 shrink-0">
                       <div className="relative">
                         <div className={`w-16 h-16 rounded-full border-4 border-white shadow-md flex items-center justify-center font-black text-2xl overflow-hidden ${sharingStudent.color || 'bg-blue-100 text-blue-600'}`}>
                            {sharingStudent.photo ? <img src={sharingStudent.photo} alt="" className="w-full h-full object-cover" /> : sharingStudent.initial}
                         </div>
                         <div className="absolute -bottom-1 -right-1 bg-white rounded-full p-0.5 shadow-sm"><CheckCircle2 size={16} className="text-[#00e676] fill-white" /></div>
                       </div>
                       <div>
                         <h2 className="text-2xl font-extrabold text-gray-800 leading-none mb-2 tracking-tight">{sharingStudent.name}</h2>
                         <div className="flex gap-2">
                           <span className="bg-green-100 text-green-700 px-3 py-1 rounded-lg text-[10px] font-black shadow-sm uppercase tracking-wider">{sharingStudent.kelas}</span>
                           <span className="bg-green-100 text-green-700 px-3 py-1 rounded-lg text-[10px] font-black shadow-sm uppercase tracking-wider">{sharingStudent.halaqoh}</span>
                         </div>
                       </div>
                     </div>

                     <div className="flex flex-col gap-3 relative z-10 px-5 flex-1 justify-center pb-6">
                       {weekDates.map((dateObj, i) => {
                         if (dateObj.getDay() === 0 || dateObj.getDay() === 6) return null;
                         const dStr = formatDateObj(dateObj);
                         const rec = sharingStudent.records[dStr] || { tahsin: '-', halAyatTahsin: '-', tahfidz: '-', ayatTahfidz: '-', murojaah: '-', catatan: '-' };
                         const dayName = getDayName(dateObj);
                         
                         return (
                           <div key={i} className="bg-white rounded-[20px] p-3.5 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.1)] border border-gray-100 relative">
                             <div className="flex justify-between items-center mb-3">
                               <span className="bg-[#00e676] text-white px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase shadow-sm">{dayName}</span>
                               <span className="text-[10px] font-bold text-gray-400 italic">{dateObj.getDate()} {['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'][dateObj.getMonth()]} {dateObj.getFullYear()}</span>
                             </div>
                             
                             <div className="grid grid-cols-2 gap-y-2 gap-x-4">
                               <div>
                                 <p className="text-[8px] font-black text-gray-400 uppercase tracking-widest mb-0.5 flex items-center gap-1"><BookOpen size={9} className="text-blue-500"/> Tahsin</p>
                                 <p className="text-[12px] font-bold text-gray-800 leading-snug line-clamp-2">{combineSuratAyatUI(rec.tahsin, rec.halAyatTahsin) || '-'}</p>
                               </div>
                               <div>
                                 <p className="text-[8px] font-black text-gray-400 uppercase tracking-widest mb-0.5 flex items-center gap-1"><Mic size={9} className="text-purple-500"/> Tahfidz</p>
                                 <p className="text-[12px] font-bold text-gray-800 leading-snug line-clamp-2">{combineSuratAyatUI(rec.tahfidz, rec.ayatTahfidz) || '-'}</p>
                               </div>
                               
                               <div className="col-span-2 pt-1.5 border-t border-gray-50">
                                  <p className="text-[8px] font-black text-gray-400 uppercase tracking-widest mb-0.5 flex items-center gap-1"><Repeat size={9} className="text-emerald-500"/> Murojaah</p>
                                  <p className="text-[12px] font-bold text-gray-700 leading-snug line-clamp-2">{rec.murojaah && rec.murojaah !== '-' ? rec.murojaah : '-'}</p>
                               </div>
                               <div className="col-span-2 pt-1.5 border-t border-gray-50">
                                  <p className="text-[8px] font-black text-gray-400 uppercase tracking-widest mb-0.5 flex items-center gap-1"><FileText size={9} className="text-orange-500"/> Catatan Guru</p>
                                  <p className={`text-[12px] font-bold leading-snug line-clamp-2 ${getStatusColor(rec.catatan)}`}>{rec.catatan && rec.catatan !== '-' ? rec.catatan : '-'}</p>
                               </div>
                             </div>
                           </div>
                         );
                       })}
                     </div>

                     <div className="bg-[#111827] text-white p-4 flex justify-center items-center shrink-0 mt-auto">
                        <div className="flex items-center justify-center gap-3 text-[11px] font-medium text-gray-300 whitespace-nowrap">
                           <span className="flex items-center gap-1.5"><User size={14} className="text-gray-400"/> Pengajar: <b className="text-white">{activeGuru}</b></span>
                           <span className="text-gray-600">|</span>
                           <span className="flex items-center gap-1.5"><Calendar size={14} className="text-[#00e676]"/> Periode: <b className="text-white">{getWeekRangeLabel()}</b></span>
                        </div>
                     </div>
                   </div>
                </div>

                <div className="bg-white border-t border-gray-200 p-4 flex flex-wrap justify-end gap-3 z-30 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                   <button onClick={() => setSharingStudent(null)} className="px-5 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-100 transition-colors text-sm w-full sm:w-auto">Batal</button>
                   <button onClick={() => handleShareStudentImage('download')} disabled={isGeneratingStudentImage} className="flex-1 sm:flex-none justify-center flex items-center gap-2 px-5 py-3 bg-[#111827] hover:bg-gray-800 text-white rounded-xl font-black transition-colors shadow-lg text-sm">
                      {isGeneratingStudentImage ? <Loader2 size={18} className="animate-spin"/> : <Download size={18}/>} Simpan Gambar
                   </button>
                   <button onClick={() => handleShareStudentImage('share')} disabled={isGeneratingStudentImage} className="flex-1 sm:flex-none justify-center flex items-center gap-2 px-6 py-3 bg-[#00e676] hover:bg-green-500 text-white rounded-xl font-black transition-colors shadow-lg shadow-green-200 text-sm">
                      {isGeneratingStudentImage ? <Loader2 size={18} className="animate-spin"/> : <Share2 size={18}/>} Bagikan Langsung
                   </button>
                </div>
              </div>
            </div>
          )}

          {isPreviewModalOpen && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex justify-center items-center z-[100] p-2 md:p-4 print-hidden">
              <div className="bg-gray-100 rounded-2xl md:rounded-3xl shadow-2xl w-full max-w-7xl h-[95vh] md:h-[90vh] overflow-hidden flex flex-col relative">
                <div className="bg-white p-4 md:p-5 border-b border-gray-200 flex justify-between items-center z-20 shadow-sm shrink-0">
                  <div><h2 className="text-lg md:text-xl font-black text-gray-800 flex items-center gap-1.5 md:gap-2"><Printer size={20} className="text-blue-600 md:w-6 md:h-6" /> Preview Cetak Laporan</h2><p className="text-xs md:text-sm text-gray-500 font-medium mt-0.5 md:mt-1">Pilih metode unduh di bawah. <b className="text-blue-600">Gulir ke bawah</b> untuk melihat halaman selanjutnya.</p></div>
                  <button onClick={() => setIsPreviewModalOpen(false)} className="p-1.5 md:p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors bg-gray-50"><X size={18} className="md:w-5 md:h-5"/></button>
                </div>
                <div id="print-preview-content" className="p-4 md:p-6 overflow-y-auto flex-1 flex flex-col gap-6 md:gap-8 custom-scrollbar bg-gray-200/50 items-center">
                   {studentChunks.length === 0 ? (<p className="text-xs md:text-sm text-gray-500 font-bold text-center mt-10 w-full">Tidak ada data untuk dicetak pada halaqoh ini.</p>) : (
                     studentChunks.map((chunk, index) => (
                      <React.Fragment key={`preview-chunk-${index}`}>
                        <div className="w-full overflow-x-auto bg-white rounded-xl shadow-md border border-gray-200 custom-scrollbar flex flex-col shrink-0">{renderExportTable(chunk, index * 2, studentChunks.length * 2, true, daysPart1)}</div>
                        <div className="w-full overflow-x-auto bg-white rounded-xl shadow-md border border-gray-200 custom-scrollbar flex flex-col shrink-0">{renderExportTable(chunk, index * 2 + 1, studentChunks.length * 2, true, daysPart2)}</div>
                      </React.Fragment>
                     ))
                   )}
                </div>
                <div className="bg-white border-t border-gray-200 p-4 md:p-5 flex flex-col md:flex-row justify-between items-center gap-4 z-30 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                  <button onClick={() => setIsPreviewModalOpen(false)} className="px-4 md:px-6 py-2 md:py-2.5 rounded-lg md:rounded-xl font-bold text-gray-500 hover:bg-gray-100 hover:text-gray-800 transition-colors text-xs md:text-sm w-full md:w-auto">Kembali</button>
                  {studentChunks.length > 0 && (
                    <div className="flex flex-col sm:flex-row gap-2 md:gap-3 w-full md:w-auto">
                      <button onClick={handlePrint} className="flex-1 sm:flex-none justify-center flex items-center gap-1.5 md:gap-2 px-4 md:px-6 py-2 md:py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg md:rounded-xl font-black transition-colors shadow-md text-xs md:text-sm"><Printer size={16} className="md:w-[18px] md:h-[18px]"/> CETAK</button>
                      <button onClick={handleExportPDF} disabled={isExportingImage || isExportingPDF} className="flex-1 sm:flex-none justify-center flex items-center gap-1.5 md:gap-2 px-4 md:px-6 py-2 md:py-2.5 bg-[#00e676] hover:bg-green-500 text-white rounded-lg md:rounded-xl font-black transition-colors shadow-lg shadow-green-200 text-xs md:text-sm">{isExportingPDF ? <Loader2 size={16} className="animate-spin md:w-[18px] md:h-[18px]"/> : <FileDown size={16} className="md:w-[18px] md:h-[18px]"/>} UNDUH PDF</button>
                      <button onClick={handleExportImage} disabled={isExportingImage || isExportingPDF} className="flex-1 sm:flex-none justify-center flex items-center gap-1.5 md:gap-2 px-4 md:px-6 py-2 md:py-2.5 bg-white border-2 border-blue-600 text-blue-600 hover:bg-blue-50 rounded-lg md:rounded-xl font-black transition-colors text-xs md:text-sm">{isExportingImage ? <Loader2 size={16} className="animate-spin md:w-[18px] md:h-[18px]"/> : <ImageIcon size={16} className="md:w-[18px] md:h-[18px]"/>} UNDUH GAMBAR</button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {isAddStudentModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex justify-center items-end sm:items-center z-[100] sm:p-4 print-hidden">
              <div className="bg-white rounded-t-3xl sm:rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col relative z-[105]">
                <div className="p-4 md:p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                  <h2 className="text-lg md:text-xl font-black text-gray-800 flex items-center gap-2"><User size={20} className="text-[#00e676]" /> Tambah Siswa Baru</h2>
                  <button onClick={() => setIsAddStudentModalOpen(false)} className="p-1.5 md:p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors bg-white shadow-sm border border-gray-200"><X size={18}/></button>
                </div>
                <form onSubmit={handleSaveNewStudent} className="p-4 md:p-6 flex flex-col gap-4">
                  <div className="flex flex-col items-center gap-3">
                    <div className="w-20 h-20 md:w-24 md:h-24 rounded-full bg-gray-100 border-2 border-dashed border-gray-300 flex items-center justify-center overflow-hidden relative group cursor-pointer hover:border-[#00e676] transition-colors">
                      {newStudent.photo ? <img src={newStudent.photo} alt="Preview" className="w-full h-full object-cover" /> : <Camera size={28} className="text-gray-400 group-hover:text-[#00e676]" />}
                      <label className="absolute inset-0 bg-black/60 hidden group-hover:flex items-center justify-center text-white text-[10px] md:text-xs font-bold cursor-pointer">Pilih Foto</label>
                      <input type="file" accept="image/*" onChange={(e) => handlePhotoUpload(e, false)} className="hidden" />
                    </div>
                    <span className="text-[10px] md:text-xs text-gray-500 font-bold bg-gray-100 px-3 py-1 rounded-full">Foto Siswa (Opsional)</span>
                  </div>
                  <div>
                    <label className="block text-[9px] md:text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Nama Lengkap</label>
                    <input type="text" required value={newStudent.name} onChange={e => setNewStudent({...newStudent, name: e.target.value})} className="w-full border border-gray-300 rounded-xl px-4 py-2.5 md:py-3 outline-none focus:ring-2 focus:ring-[#00e676] bg-white text-sm font-semibold shadow-inner" placeholder="Contoh: Ahmad Fauzi..." />
                  </div>
                  <div className="grid grid-cols-2 gap-3 md:gap-4">
                    <div>
                      <label className="block text-[9px] md:text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Kelas</label>
                      <select value={newStudent.kelas} onChange={e => setNewStudent({...newStudent, kelas: e.target.value})} className="w-full border border-gray-300 rounded-xl px-3 py-2.5 md:py-3 outline-none focus:ring-2 focus:ring-[#00e676] bg-white text-xs md:text-sm font-bold cursor-pointer">
                        {kelasList.map(k => <option key={k} value={k}>{k}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-[9px] md:text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Halaqoh</label>
                      <input type="text" disabled value={newStudent.halaqoh} className="w-full border border-gray-200 rounded-xl px-3 py-2.5 md:py-3 bg-gray-50 text-xs md:text-sm font-bold text-gray-500 cursor-not-allowed" />
                    </div>
                  </div>
                  <button type="submit" className="mt-4 w-full bg-[#00e676] hover:bg-green-500 text-white font-black py-3 md:py-3.5 rounded-xl shadow-lg shadow-green-200 transition-transform active:scale-95 flex items-center justify-center gap-2 text-sm"><Save size={18} /> Simpan Siswa</button>
                </form>
              </div>
            </div>
          )}

          {isEditStudentModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex justify-center items-end sm:items-center z-[100] sm:p-4 print-hidden">
              <div className="bg-white rounded-t-3xl sm:rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col relative z-[105]">
                <div className="p-4 md:p-5 border-b border-gray-100 flex justify-between items-center bg-blue-50/50">
                  <h2 className="text-lg md:text-xl font-black text-gray-800 flex items-center gap-2"><Edit3 size={20} className="text-blue-600" /> Edit Data Siswa</h2>
                  <button onClick={() => setIsEditStudentModalOpen(false)} className="p-1.5 md:p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors bg-white shadow-sm border border-gray-200"><X size={18}/></button>
                </div>
                <form onSubmit={handleUpdateStudent} className="p-4 md:p-6 flex flex-col gap-4">
                  <div className="flex flex-col items-center gap-3">
                    <div className="w-20 h-20 md:w-24 md:h-24 rounded-full bg-gray-100 border-2 border-dashed border-gray-300 flex items-center justify-center overflow-hidden relative group cursor-pointer hover:border-blue-500 transition-colors">
                      {editStudentData.photo ? <img src={editStudentData.photo} alt="Preview" className="w-full h-full object-cover" /> : <Camera size={28} className="text-gray-400 group-hover:text-blue-500" />}
                      <label className="absolute inset-0 bg-black/60 hidden group-hover:flex items-center justify-center text-white text-[10px] md:text-xs font-bold cursor-pointer">Ubah Foto</label>
                      <input type="file" accept="image/*" onChange={(e) => handlePhotoUpload(e, true)} className="hidden" />
                    </div>
                    <span className="text-[10px] md:text-xs text-gray-500 font-bold bg-gray-100 px-3 py-1 rounded-full">Foto Siswa (Opsional)</span>
                  </div>
                  <div>
                    <label className="block text-[9px] md:text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Nama Lengkap</label>
                    <input type="text" required value={editStudentData.name} onChange={e => setEditStudentData({...editStudentData, name: e.target.value})} className="w-full border border-gray-300 rounded-xl px-4 py-2.5 md:py-3 outline-none focus:ring-2 focus:ring-blue-500 bg-white text-sm font-semibold shadow-inner" placeholder="Contoh: Ahmad Fauzi..." />
                  </div>
                  <div className="grid grid-cols-2 gap-3 md:gap-4">
                    <div>
                      <label className="block text-[9px] md:text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Kelas</label>
                      <select value={editStudentData.kelas} onChange={e => setEditStudentData({...editStudentData, kelas: e.target.value})} className="w-full border border-gray-300 rounded-xl px-3 py-2.5 md:py-3 outline-none focus:ring-2 focus:ring-blue-500 bg-white text-xs md:text-sm font-bold cursor-pointer">
                        {kelasList.map(k => <option key={k} value={k}>{k}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-[9px] md:text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Halaqoh</label>
                      <input type="text" disabled value={editStudentData.halaqoh} className="w-full border border-gray-200 rounded-xl px-3 py-2.5 md:py-3 bg-gray-50 text-xs md:text-sm font-bold text-gray-500 cursor-not-allowed" />
                    </div>
                  </div>
                  <button type="submit" className="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3 md:py-3.5 rounded-xl shadow-lg shadow-blue-200 transition-transform active:scale-95 flex items-center justify-center gap-2 text-sm"><Save size={18} /> Perbarui Data</button>
                </form>
              </div>
            </div>
          )}

          {confirmDialog.isOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex justify-center items-center z-[500] p-4 print-hidden">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col items-center p-6 md:p-8 text-center animate-in zoom-in duration-200">
                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-4 border-4 border-red-100">
                  <AlertCircle size={32} strokeWidth={2.5} />
                </div>
                <h3 className="text-xl font-black text-gray-800 mb-2">{confirmDialog.title}</h3>
                <p className="text-sm text-gray-500 font-medium mb-6">{confirmDialog.message}</p>
                <div className="flex gap-3 w-full">
                  <button onClick={() => setConfirmDialog({ isOpen: false, title: '', message: '', onConfirm: null })} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 font-black py-3 rounded-xl transition-colors text-sm">Batal</button>
                  <button onClick={() => { if(confirmDialog.onConfirm) confirmDialog.onConfirm(); setConfirmDialog({ isOpen: false, title: '', message: '', onConfirm: null }); }} className="flex-1 bg-red-500 hover:bg-red-600 text-white font-black py-3 rounded-xl transition-colors text-sm">Ya, Lanjutkan</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    function App() {
      const [isLoggedIn, setIsLoggedIn] = useState(() => localStorage.getItem('isLoggedIn') === 'true');

      const handleLoginSuccess = () => {
        localStorage.setItem('isLoggedIn', 'true');
        setIsLoggedIn(true);
      };

      if (!isLoggedIn) {
        return <LoginScreen onLogin={handleLoginSuccess} />;
      }

      return <MainApp />;
    }

    // Melakukan render aplikasi ke div ber-ID "root"
    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
